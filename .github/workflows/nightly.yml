name: nightly-full

# P1.6 (remediation, 2026-07-11): the per-push job stays slim; THIS job installs the FULL pinned
# dependency set (torch/xgboost included — their tests stop self-skipping) and runs the entire
# suite nightly. Failures here that the slim job missed = dependency-coupled regressions.

on:
  schedule:
    - cron: "0 7 * * *"          # 07:00 UTC nightly
  workflow_dispatch:

jobs:
  pytest-windows:
    # P1.6 completion (2026-07-12): the production host is Windows — the suite must pass where
    # it deploys (zoneinfo, paths, sqlite WAL, ctypes mutex fallbacks all differ).
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install (slim set — mirrors the per-push job)
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn lightgbm duckdb pyarrow fastapi pydantic pytest httpx
      - name: Run suite on Windows
        working-directory: BOT
        run: python -m pytest tests -q

  pytest-full:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install FULL pinned set
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run the full suite (synthetic — no data drive on CI)
        working-directory: BOT
        run: python -m pytest tests -q
