name: tests

# CI gate (engineering audit item): the full synthetic test suite on every push/PR.
# Data-store-dependent paths are not exercised — the suite is designed to run without
# the parquet drive (synthetic frames only); torch tests self-skip when torch is absent.

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install (slim CI set — no torch/xgboost; those tests self-skip)
        run: |
          python -m pip install --upgrade pip
          # httpx: required by starlette/fastapi TestClient (import-time in starlette >=1.3) —
          #        without it every TestClient test file errors at COLLECTION and aborts the run.
          # pytz:  DuckDB needs it for timestamptz min/max in the data-QA path; pandas 3.0 no
          #        longer pulls pytz transitively, so a clean install must name it explicitly.
          pip install numpy pandas scikit-learn lightgbm duckdb pyarrow \
                      fastapi pydantic pytest httpx pytz
      - name: Run suite
        working-directory: BOT
        run: python -m pytest tests -q
